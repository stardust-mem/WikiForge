# PKM 配置文件
# 复制为 config.yaml 并填入你的 API keys

llm:
  # 云端模型（用于 Wiki 生成、语义分段、问答等复杂任务）
  cloud_provider: "deepseek"          # claude / deepseek / kimi / openai
  cloud_model: "deepseek-chat"
  cloud_api_key: ""
  cloud_base_url: "https://api.deepseek.com"

  # 本地模型（用于分类、简单摘要等轻量任务）
  local_provider: "ollama"
  local_model: "qwen2.5:14b"
  local_base_url: "http://localhost:11434"

  # Vision 模型（用于图片描述，需要多模态能力）
  vision_provider: "claude"
  vision_model: "claude-sonnet-4-6"
  vision_api_key: ""

  # 嵌入模型（本地运行）
  embedding_model: "BAAI/bge-small-zh-v1.5"

# 路径配置
paths:
  wiki_root: "wiki-root"
  database: "data/wiki.db"
  uploads: "data/uploads"

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8000
